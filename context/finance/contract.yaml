# ==========================================
# SaaS 级别：企业财务治理蓝图
# 作用：与管理层对齐"这家公司怎么算账、怎么管业务"
# ==========================================

tenant_meta:
  company_name: "某某科技有限公司"
  industry_template: "制造业/商贸/SaaS/互联网" # 用于预置不同的初始模型

# ==========================================
# 第一层：财务基因 (解决"用什么规矩算账")
# 这是整个系统的地基，决定了所有底层单据的流转逻辑
# ==========================================
financial_dna:
  accounting_standards:
    local_gaap: "CAS"          # 中国企业会计准则 / US GAAP / IFRS
    reporting_currency: "CNY"  # 本位币
    fiscal_year_start: "01-01" # 会计年度起始月
    
  basic_policies:
    inventory_costing: "Weighted_Average" # 存货计价：先进先出/加权平均/个别计价
    depreciation_method: "Straight_Line"  # 折旧方法：直线法/双倍余额递减
    revenue_recognition: "Point_In_Time"  # 收入确认：时点法/时段法(新收入准则)

# ==========================================
# 第二层：核算边界与编账规则 (解决"杂七杂八怎么变成报表")
# 这是连接业务动作和财务报表的桥梁
# ==========================================
accounting_boundaries:
  chart_of_accounts_design:
    template: "一般企业通用科目体系"
    custom_rules:
      - "将原有【研发费用】从【管理费用】中单列一级科目"
      - "增加【合同履约成本】一级科目以适应新收入准则"

  business_to_finance_mapping: # 业财转换规则（SaaS的核心价值）
    procurement:
      rule: "采购入库单匹配发票后，自动生成借：存货，贷：应付"
      cost_allocation: "运费/装卸费按采购金额比例自动分摊入存货成本"
      
    sales:
      rule: "根据出库单及客户签收，触发收入确认"
      tax_handling: "价税分离，自动计算销项税额"

# ==========================================
# 第三层：管理口径转换 (解决"老板看的东西和给税务局看的不一样")
# SaaS 必须支持双账套/多维度视图
# ==========================================
management_accounting_bridge:
  adjustments_rules: # 从"财务账"调整为"管理账"的规则
    - name: "剔除非经常性损益"
      description: "在计算核心利润时，系统自动剔除政府补助和资产处置收益"
      
    - name: "研发费用全口径还原"
      description: "管理报表中，将计入损益的研发费用加回，统一视为资本化投入进行考核"
      
    - name: "总部费用分摊"
      method: "按各业务线收入占比，将公共后台费用强制分摊至前端业务线利润表"

# ==========================================
# 第四层：经营指标与风控契约 (长在账务体系上的"果实")
# 这里的指标，底层完全依赖前三层的算账逻辑
# ==========================================
operational_covenants:
  
  # ---- 经营健康度仪表盘 (老板视角的北极星指标) ----
  health_metrics:
    - metric_name: "经营性现金流净额"
      source: "现金流量表 -> 经营活动产生"
      management_adjustment: "使用【管理口径】调整后的现金流"
      
    - metric_name: "核心业务毛利率"
      source: "利润表 -> 营业收入 / 营业成本"
      management_adjustment: "剔除退货冲减，按订单交付确认口径计算"

  # ---- 风控红线 (CFO视角的刹车系统) ----
  risk_red_lines:
    - metric_name: "资金安全垫 (现金短债比)"
      source: "资产负债表 -> 货币资金 / 一年内到期非流动负债"
      limit: ">= 1.2"
      trigger_action: "SaaS 系统内【付款审批流】自动增加' CFO 特别复核'节点"

    - metric_name: "客户信用敞口"
      source: "管理账 -> 应收账款按账龄分析汇总"
      limit: "账龄超90天占比 <= 15%"
      trigger_action: "SaaS 系统【销售下单模块】自动拦截超标客户的赊销订单"
