# ==========================================
# 企业财务治理蓝图 (底层规则契约)
# 模板ID：TPL_SAAS_VENDOR_DEMO
# 模板提供方：云财科技 (SaaS 厂商自身真实配置)
# 用途说明：向客户示范如何将公司的法务、税务、核算规则结构化录入系统。
# ==========================================

template_info:
  name: "SaaS 厂商标准治理蓝图 (参考模板)"
  version: "1.0"
  description: "本模板展示了典型轻资产、软件服务企业的财务基因配置。您可以根据自身企业的实际情况修改以下规则。"

# ==========================================
# 第一域：法务与税务基础
# 回答的问题：我们在哪？我们是什么身份？我们要按什么税率交税？
# ==========================================
legal_and_tax_profile:
  entity_structure:
    legal_name: "云财科技有限公司"
    registered_location: "北京市海淀区" 
    entity_type: "有限责任公司"
    
  tax_identity:
    taxpayer_qualification: "一般纳税人" # 一般纳税人 / 小规模纳税人
    
    # 关键税种与政策适用 (直接决定系统怎么算税)
    vat_policy:
      main_business_scope: "软件销售与信息技术服务"
      applicable_rates:
        software_sales: "13%"         # 增值税-货物
        it_services: "6%"             # 增值税-现代服务
      special_policy: "软件产品增值税超税负即征即退政策" # 告诉系统：这笔税后面会退回来，不能直接算作当期费用
    
    corporate_income_tax:
      standard_rate: "25%"
    # 【SaaS 厂商注释】：我们通过了高新技术企业认定，享受优惠税率。
    preferential_policies:
      - policy_name: "高新技术企业优惠"
        adjusted_rate: "15%"
      - policy_name: "研发费用加计扣除"
        deduction_ratio: "100%" # 告诉系统：在算所得税时，研发费用要按 200% 来扣除

# ==========================================
# 第二域：财务准则与账套基础
# 回答的问题：我们按什么规矩记账？我们的账本长什么样？
# ==========================================
accounting_standards:
  primary_gaap: "CAS" # Chinese Accounting Standards (企业会计准则)
  
  reporting_currency:
    functional_currency: "CNY" # 记账本位币：人民币
    
  fiscal_calendar:
    fiscal_year_start_month: 1 # 会计年度起始月：1月
    # 【SaaS 厂商注释】：我们是自然年，但有些跨国企业或零售企业可能是非自然年（如 4月起始）。
    
  accounting_period_rules:
    sub_periods: "Monthly" # 按月结账
    # 告诉系统：必须在次月 X 号前完成上月结账动作，否则触发结账延期预警。

# ==========================================
# 第三域：核心业务核算政策
# 回答的问题：业务发生了，我们财务账上到底怎么记？这是业财转换的核心。
# ==========================================
core_accounting_policies:
  
  revenue_recognition: # 收入确认政策 (重中之重)
    primary_standard: "新收入准则 (CAS 14 - 2017)"
    scenarios:
      - scenario_name: "SaaS 订阅收入 (会员费/年费)"
        recognition_method: "时段法确认"
        # 【SaaS 厂商注释】：客户一次性交了一年钱，我们不能当天全认收入，要按月分摊。
        system_action: "收到款项计入合同负债，按月结转至主营业务收入"
        
      - scenario_name: "一次性软件实施交付"
        recognition_method: "时点法确认"
        system_action: "取得客户验收报告的当天，一次性确认收入"

  expenditure_capitalization: # 支出资本化政策
    research_and_development: # 研发支出处理
      policy: "全部费用化"
      # 【SaaS 厂商注释】：虽然准则允许资本化，但为了享受加计扣除和财务保守原则，我们选择全部进当期损益（研发费用）。
      system_action: "所有研发人员工资、云服务器折旧等，月末自动结转至【研发费用-费用化支出】"

  asset_capitalization_thresholds: # 资产资本化门槛
    fixed_assets:
      minimum_capitalization_amount: 3000 # 3000元以下直接进费用，不入固定资产卡片
      depreciation_methods:
        servers_and_network: "Straight_Line_3_Years"  # 服务器折旧3年
        office_equipment: "Straight_Line_3_Years"     # 电脑等办公设备3年
        office_furniture: "Straight_Line_5_Years"     # 办公家具5年
      residual_value_rate: "5%" # 残值率 5%

    intangible_assets:
      minimum_capitalization_amount: 5000
      amortization_methods:
        purchased_software: "Straight_Line_2_Years"   # 外购软件摊销2年
      residual_value_rate: "0%"

  cost_allocation_rules: # 成本分摊规则 (管理精细度的体现)
    - cost_center: "公共后台部门 (如HR、行政)"
      allocation_base: "按各部门人数比例分摊"
      target_centers: "所有前台业务线"
      # 告诉系统：月末结账时，自动把行政费用切分到各个业务线的利润表上去。

# ==========================================
# 第四域：合并与组织边界 (可选扩展，针对有子公司的客户)
# ==========================================
group_reporting_rules:
  is_group_entity: true # 是否启用集团合并
  consolidation_method:
    - subsidiary_name: "云财(深圳)信息技术有限公司"
      ownership_ratio: "100%"
      control_type: "Full_Consolidation" # 全额合并
      
    - subsidiary_name: "CloudFin US Inc."
      ownership_ratio: "60%"
      functional_currency: "USD"
      control_type: "Full_Consolidation"
      # 特殊规则：合并时需要将美元报表折算为人民币。
      translation_policy: "资产负债表按期末汇率折算，利润表按平均汇率折算，差额计入其他综合收益"
