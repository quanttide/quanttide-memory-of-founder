# ==========================================
# 纯技术视角：指标动态计算与规则引擎元模型
# ==========================================

# 1. 数据源映射层 - 解耦底层表结构
# 作用：告诉系统去哪里取"原子数据"，表名变了只改这里，不改代码
data_source_mappings:
  - alias: "BS_TOTAL_ASSETS"           # 系统内部统一代号
    query: "SELECT SUM(amount) FROM balance_sheet WHERE item_code = 'A001' AND period = {period}"
    
  - alias: "BS_TOTAL_LIABILITIES"
    query: "SELECT SUM(amount) FROM balance_sheet WHERE item_code = 'L001' AND period = {period}"
    
  - alias: "IS_NET_PROFIT"
    query: "SELECT amount FROM income_statement WHERE item_code = 'P010' AND period = {period}"

# 2. 指标定义层 - 引入表达式引擎
# 作用：不再写 if/else 计算逻辑，而是将公式存为字符串，由系统内置的表达式引擎（如 Aviator, QLExpress, Spring EL）动态解析执行
indicator_definitions:
  - indicator_code: "IND_GEARING_RATIO"
    name: "资产负债率"
    # 核心技术点：公式字符串化，引用上面定义的 alias
    formula_expr: "${BS_TOTAL_LIABILITIES} / ${BS_TOTAL_ASSETS}"
    # 核心技术点：计算时的技术处理策略
    compute_strategy:
      divide_by_zero_handler: "return_null" # 分母为0时返回空，而不是报错
      precision: 4                        # 保留4位小数
      format: "percentage"                # 输出格式化为百分比

  - indicator_code: "IND_DSO"
    name: "应收账款周转天数"
    formula_expr: "(${BS_AR} / ${IS_REVENUE}) * 365"
    compute_strategy:
      divide_by_zero_handler: "return_infinity"

# 3. 规则判定层 - 规则与指标彻底解耦
# 作用：同一个指标（如资产负债率），可以挂载无数条不同的规则，且支持动态启停
rule_definitions:
  - rule_id: "RULE_001"
    indicator_code: "IND_GEARING_RATIO" # 绑定哪个指标
    is_active: true                      # 数据库开关，无需改代码即可停用规则
    
    # 核心技术点：条件表达式，交由规则引擎执行
    condition_expr: "value > 0.65"       # 这里的 value 是 indicator_definitions 算出来的结果
    
    # 核心技术点：动作解耦，触发后执行什么（通过策略模式或事件总线实现）
    action_config:
      type: "WEBHOOK"                    # 可以是发消息、调接口、写日志等
      payload: 
        url: "http://risk-system.internal/api/alert"
        body_template: "指标【${indicator_name}】当前值【${value}】突破阈值【0.65】"

  - rule_id: "RULE_002"
    indicator_code: "IND_GEARING_RATIO"
    is_active: false                     # 比如老板说这个规则暂时不用了，DBA改一下这个字段即可
    condition_expr: "value > 0.60 && value <= 0.65"
    action_config:
      type: "LOG_AND_NOTIFY"
      level: "WARN"

# 4. 契约实例层 - 运行时的拼装
# 作用：CFO在界面上"拖拉拽"生成一份契约，本质上是将上面的元数据关联起来
contract_instances:
  - contract_id: "COV_2024_V1"
    name: "2024年度基础风控契约"
    included_rules: 
      - "RULE_001"
      - "RULE_003"
      - "RULE_005"
