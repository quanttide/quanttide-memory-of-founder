<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, viewport-fit=cover">
  <title>指挥官决策系统 · 边境哨站事件</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c0f;
      font-family: 'Courier New', 'Source Code Pro', 'Menlo', 'Consolas', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      color: #b0c7d9;
    }

    /* 主指挥舱容器 */
    .command-shell {
      width: 100%;
      max-width: 680px;
      background: #0d1218;
      border: 1px solid #2e3b4a;
      border-radius: 18px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(70, 130, 200, 0.15) inset;
      padding: 24px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      backdrop-filter: blur(2px);
      position: relative;
    }

    /* 装饰性扫描线效果（极淡） */
    .command-shell::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0, 255, 100, 0.015) 0px, rgba(0, 0, 0, 0.02) 2px, transparent 3px);
      pointer-events: none;
      border-radius: 18px;
    }

    /* 标题栏 */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2a3847;
      padding-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .header-icon {
      font-size: 1.8rem;
      filter: drop-shadow(0 0 6px #4a90e2);
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 2px;
      color: #d0e2f2;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(74, 144, 226, 0.5);
      margin: 0;
    }

    .status-tags {
      margin-left: auto;
      display: flex;
      gap: 12px;
      font-size: 0.75rem;
      color: #8ba0b5;
    }

    .status-tag {
      background: #131b24;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #2e4055;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 当前情境面板 */
    .narrative-panel {
      background: #10171f;
      border: 1px solid #1f2d3d;
      border-radius: 14px;
      padding: 18px 16px;
      position: relative;
      z-index: 1;
      box-shadow: inset 0 0 16px rgba(0, 0, 0, 0.6);
    }

    .narrative-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #5f7f9f;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .narrative-text {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #c4d5e6;
      text-shadow: 0 0 3px rgba(0, 160, 255, 0.3);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .narrative-text strong {
      color: #f0c060;
      font-weight: bold;
      text-shadow: 0 0 5px #b57c1c;
    }

    /* 选项区域 */
    .options-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .option-btn {
      background: #0f1922;
      border: 1px solid #2c4055;
      border-left: 4px solid #36658b;
      border-radius: 10px;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 0.95rem;
      color: #d2e0f0;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: 0.4px;
      background: linear-gradient(135deg, #0f1922 0%, #101b26 100%);
    }

    .option-btn:hover {
      border-color: #4a7aa9;
      background: #132433;
      border-left-color: #5b92c9;
      box-shadow: 0 0 14px rgba(70, 140, 210, 0.3);
      color: #f0f6ff;
    }

    .option-btn:active {
      background: #0a1a28;
      border-color: #2d5275;
    }

    .option-btn.disabled,
    .option-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.5);
    }

    .option-icon {
      font-size: 1.4rem;
      min-width: 28px;
      text-align: center;
    }

    /* 后果叙事（选择后出现） */
    .consequence-block {
      background: #10161d;
      border-left: 4px solid #c9a03a;
      border-radius: 8px;
      padding: 14px 16px;
      margin-top: 8px;
      color: #e4c27e;
      font-style: italic;
      position: relative;
      z-index: 1;
      animation: fadeSlide 0.3s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 指挥官日志区域 */
    .log-panel {
      background: #0b1016;
      border: 1px solid #1f2e3c;
      border-radius: 12px;
      padding: 14px 14px 8px;
      position: relative;
      z-index: 1;
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      color: #6988a3;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .log-entries {
      max-height: 180px;
      overflow-y: auto;
      font-size: 0.8rem;
      color: #99b3cc;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }

    .log-entry {
      border-bottom: 1px dashed #1e3040;
      padding-bottom: 6px;
      display: flex;
      gap: 8px;
    }

    .log-time {
      color: #507090;
      white-space: nowrap;
      font-size: 0.7rem;
    }

    .log-action {
      color: #b8cfe0;
    }

    .reset-btn {
      background: transparent;
      border: 1px solid #2f4459;
      color: #7f98b2;
      padding: 6px 14px;
      border-radius: 20px;
      font-family: inherit;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 0.5px;
    }

    .reset-btn:hover {
      border-color: #5b7b9c;
      color: #d0e0f5;
      background: #15212e;
    }

    /* 隐藏的工具类 */
    .hidden {
      display: none;
    }

    /* 滚动条美化 */
    .log-entries::-webkit-scrollbar {
      width: 4px;
    }
    .log-entries::-webkit-scrollbar-track {
      background: #0a0f14;
    }
    .log-entries::-webkit-scrollbar-thumb {
      background: #2c4055;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="command-shell">
    <!-- 头部 -->
    <div class="header">
      <span class="header-icon">🛡️</span>
      <h1>指挥官决策系统</h1>
      <div class="status-tags">
        <span class="status-tag">⚡ 士气 <span id="moraleValue">70</span></span>
        <span class="status-tag">⏳ 时间 <span id="timeValue">14:32</span></span>
      </div>
    </div>

    <!-- 情境叙事面板 -->
    <div class="narrative-panel" id="narrativePanel">
      <div class="narrative-label">
        <span>📡 紧急通讯 · 边境哨站 7-Alpha</span>
      </div>
      <div class="narrative-text" id="narrativeText">
        <!-- 动态填充 -->
      </div>
      <!-- 后果反馈会动态插入这里 -->
      <div id="consequenceContainer"></div>
    </div>

    <!-- 选项面板 -->
    <div class="options-panel" id="optionsContainer">
      <!-- 动态生成选项按钮 -->
    </div>

    <!-- 指挥官日志 -->
    <div class="log-panel">
      <div class="log-header">
        <span>📋 指挥官日志</span>
        <button class="reset-btn" id="resetButton">⟳ 重启任务</button>
      </div>
      <div class="log-entries" id="logEntries">
        <div class="log-entry">
          <span class="log-time">14:30</span>
          <span class="log-action">系统启动 · 等待指令</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // --- 游戏状态定义 ---
      const state = {
        morale: 70,          // 士气值 (0-100)
        currentTime: "14:32",
        // 历史选择标记 (互动小说式flag)
        flags: [],
        // 当前情境节点ID
        currentNodeId: 'border_crisis',
        // 是否选择已做出（用于禁用选项）
        choiceMade: false,
        // 日志条目
        log: [
          { time: "14:30", text: "系统启动 · 等待指令" }
        ]
      };

      // --- 故事节拍定义 (最小闭环 + 扩展一个后续节点) ---
      const storyNodes = {
        // 第一个决策点：边境哨站遇袭
        border_crisis: {
          id: 'border_crisis',
          narrative: `通讯频道传来断断续续的信号。\n\n"……这里是哨站 <strong>7-Alpha</strong>，我们遭到不明袭击……重复，遭到袭击！请求立即支援……有<strong>非战斗人员</strong>在内……"\n\n信号在一阵刺耳的静电噪音后彻底中断。你的副官抬头看向你，等待命令。`,
          options: [
            {
              id: 'send_troops',
              text: '⚔️ 立即派遣快速反应部队',
              icon: '🚁',
              consequences: {
                morale: 10,
                flag: 'immediate_response',
                narrative: '"A队、B队，紧急起飞！"你果断下令。运输机在五分钟内升空，士兵们的肾上腺素在燃烧。所有人都明白，速度就是生命。'
              },
              nextNode: 'arrival_scene'  // 下一个节点
            },
            {
              id: 'scout_first',
              text: '🛰️ 先派出侦察无人机，延迟30分钟',
              icon: '📡',
              consequences: {
                morale: -5,
                flag: 'cautious_approach',
                narrative: '"先看看情况。"你压制住冲动。无人机悄无声息地滑入暮色，画面传回：哨站仍在冒着黑烟，但未见敌人踪迹。这30分钟，对困在里面的人来说无比漫长。'
              },
              nextNode: 'arrival_scene'  // 同一个后续节点，但叙事会根据flag变化
            }
          ]
        },
        // 第二个节点：部队/侦察抵达后的场面（根据前一个选择产生不同叙事）
        arrival_scene: {
          id: 'arrival_scene',
          // 动态叙事函数：根据历史flag生成文本
          getNarrative: function(flags) {
            if (flags.includes('immediate_response')) {
              return `快速反应部队抵达哨站废墟。幸存者被及时从瓦砾中救出，但袭击者已经撤离。一名受伤的工程师抓住你的队长，用颤抖的手指向北方："他们…他们带走了数据核心……"`;
            } else if (flags.includes('cautious_approach')) {
              return `无人机侦察完毕后，救援队才进入哨站。不幸的是，延误让几名伤员情况恶化。但你也因此发现了袭击者留下的陷阱----如果贸然进入，伤亡会更惨重。一名意识模糊的士兵喃喃道："他们拿走了…协议文件……"`;
            }
            return `部队抵达哨站，现场一片混乱。`;
          },
          options: [
            {
              id: 'pursue',
              text: '🏃 立即追击袭击者',
              icon: '🎯',
              consequences: {
                morale: 15,
                flag: 'pursuit',
                narrative: '你下令追击。部队循着痕迹深入北部荒原。这是一场赌博，但可能截回重要的情报。'
              },
              nextNode: null  // 可视为结局
            },
            {
              id: 'fortify',
              text: '🏰 巩固防御，优先救治伤员',
              icon: '🏥',
              consequences: {
                morale: 5,
                flag: 'defend',
                narrative: '你选择先稳固局势。医疗兵全力抢救每一位幸存者，工程师开始修复通讯阵列。至于失踪的数据，或许能从生还者口中得知更多。'
              },
              nextNode: null  // 结局
            }
          ]
        }
      };

      // --- DOM元素引用 ---
      const narrativeTextEl = document.getElementById('narrativeText');
      const optionsContainer = document.getElementById('optionsContainer');
      const consequenceContainer = document.getElementById('consequenceContainer');
      const logEntriesEl = document.getElementById('logEntries');
      const moraleValueEl = document.getElementById('moraleValue');
      const timeValueEl = document.getElementById('timeValue');
      const resetButton = document.getElementById('resetButton');

      // --- 辅助函数：更新时间显示 ---
      function updateDisplay() {
        moraleValueEl.textContent = state.morale;
        timeValueEl.textContent = state.currentTime;
      }

      // --- 添加日志条目 ---
      function addLogEntry(text) {
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        state.log.push({ time: timeStr, text });
        renderLog();
      }

      function renderLog() {
        logEntriesEl.innerHTML = state.log.map(entry => 
          `<div class="log-entry">
            <span class="log-time">${entry.time}</span>
            <span class="log-action">${entry.text}</span>
          </div>`
        ).join('');
        // 滚动到底部
        logEntriesEl.scrollTop = logEntriesEl.scrollHeight;
      }

      // --- 渲染当前节点 ---
      function renderNode(nodeId) {
        const node = storyNodes[nodeId];
        if (!node) {
          // 结局或无节点
          narrativeTextEl.innerHTML = '<em>任务结束。感谢你的指挥。</em>';
          optionsContainer.innerHTML = '';
          consequenceContainer.innerHTML = '';
          state.choiceMade = false;
          return;
        }

        // 获取叙事文本
        let narrative = '';
        if (typeof node.narrative === 'function') {
          narrative = node.narrative(state.flags);
        } else if (typeof node.narrative === 'string') {
          narrative = node.narrative;
        }
        narrativeTextEl.innerHTML = narrative.replace(/\n/g, '<br>');

        // 清空之前的后果
        consequenceContainer.innerHTML = '';

        // 生成选项按钮
        optionsContainer.innerHTML = '';
        if (node.options && node.options.length > 0) {
          node.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span class="option-icon">${opt.icon || '🔘'}</span>${opt.text}`;
            btn.addEventListener('click', () => handleChoice(node, opt));
            optionsContainer.appendChild(btn);
          });
          state.choiceMade = false;
        } else {
          // 没有选项，可能是结局
          optionsContainer.innerHTML = '<div style="color:#6b7f8f; padding:8px; font-style:italic;">无可用行动 · 等待进一步指令</div>';
          state.choiceMade = true;
        }
      }

      // --- 处理玩家选择 ---
      function handleChoice(node, option) {
        if (state.choiceMade) return; // 防止重复点击
        state.choiceMade = true;

        // 禁用所有选项按钮
        document.querySelectorAll('.option-btn').forEach(btn => {
          btn.disabled = true;
          btn.classList.add('disabled');
        });

        // 应用后果
        const cons = option.consequences;
        if (cons.morale) {
          state.morale = Math.min(100, Math.max(0, state.morale + cons.morale));
        }
        if (cons.flag) {
          state.flags.push(cons.flag);
        }

        // 显示后果叙事
        if (cons.narrative) {
          consequenceContainer.innerHTML = `<div class="consequence-block">📝 ${cons.narrative}</div>`;
        }

        // 记录日志
        addLogEntry(`选择：${option.text}`);
        if (cons.flag) {
          addLogEntry(`标记：${cons.flag}`);
        }

        // 更新士气显示
        updateDisplay();

        // 模拟时间流逝
        advanceTime(5); // 每次决策消耗5分钟

        // 延迟后进入下一个节点（让玩家有时间看后果）
        setTimeout(() => {
          if (option.nextNode) {
            state.currentNodeId = option.nextNode;
            addLogEntry(`---- 进入新阶段 ----`);
            renderNode(option.nextNode);
          } else {
            // 结局
            narrativeTextEl.innerHTML = '<em>通讯频道恢复了平静。你的决策已被记录，历史将评判这一切。</em>';
            optionsContainer.innerHTML = '';
            consequenceContainer.innerHTML = '';
            state.choiceMade = false;
            addLogEntry('任务完成。');
          }
        }, 2500);
      }

      // --- 时间推进 ---
      function advanceTime(minutes) {
        let [h, m] = state.currentTime.split(':').map(Number);
        m += minutes;
        if (m >= 60) {
          h += Math.floor(m / 60);
          m = m % 60;
        }
        h = h % 24;
        state.currentTime = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        updateDisplay();
      }

      // --- 重置游戏 ---
      function resetGame() {
        state.morale = 70;
        state.currentTime = "14:32";
        state.flags = [];
        state.currentNodeId = 'border_crisis';
        state.choiceMade = false;
        state.log = [{ time: "14:30", text: "系统启动 · 等待指令" }];
        
        consequenceContainer.innerHTML = '';
        updateDisplay();
        renderLog();
        renderNode('border_crisis');
        addLogEntry('任务重置 · 新决策序列开始');
      }

      // --- 绑定重置按钮 ---
      resetButton.addEventListener('click', resetGame);

      // --- 初始启动 ---
      updateDisplay();
      renderNode('border_crisis');
      addLogEntry('收到哨站7-Alpha紧急通讯');
    })();
  </script>
</body>
</html>
