<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C02 · 我的部队真的累了 -- ForceBloc 红线验证</title>
    <style>
        :root {
            --bg: #1a1d1f;
            --surface: #212529;
            --surface-light: #2a2f34;
            --border: #3a3f44;
            --text-primary: #e8e6e3;
            --text-secondary: #b0aba4;
            --text-muted: #7a756f;
            --green-fill: #4caf84;
            --green-glow: rgba(76, 175, 132, 0.35);
            --red-zone: #5c2a2e;
            --red-fill: #e0555a;
            --red-glow: rgba(224, 85, 90, 0.5);
            --red-line: #f05a5f;
            --accent-gold: #c9a96e;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', 'Monaco', monospace;
            --font-sans: 'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            --transition-fast: 0.12s ease-out;
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: var(--font-sans);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(60, 65, 70, 0.25) 0%, transparent 70%),
                radial-gradient(ellipse at 50% 80%, rgba(30, 32, 35, 0.6) 0%, transparent 60%);
        }

        /* 主面板 */
        .command-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px 28px 24px;
            width: 100%;
            max-width: 480px;
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.45),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            position: relative;
            overflow: hidden;
        }

        /* 顶部微妙的纹理线 */
        .command-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(201, 169, 110, 0.3) 15%,
                    rgba(201, 169, 110, 0.55) 50%,
                    rgba(201, 169, 110, 0.3) 85%,
                    transparent 100%);
            border-radius: 0 0 1px 1px;
        }

        /* 头部 */
        .panel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .unit-insignia {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            color: var(--accent-gold);
            letter-spacing: -1px;
            font-weight: 700;
        }

        .unit-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .unit-name {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.3px;
            line-height: 1.2;
        }
        .unit-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-family: var(--font-mono);
        }
        .badge-row {
            display: flex;
            gap: 8px;
            margin-top: 3px;
        }
        .badge {
            font-size: 9px;
            padding: 2px 7px;
            border-radius: 10px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-family: var(--font-mono);
            letter-spacing: 0.4px;
        }
        .badge.warning {
            border-color: rgba(240, 90, 95, 0.4);
            color: #e8a0a3;
        }

        /* 体力条区域 */
        .stamina-section {
            margin-bottom: 20px;
        }
        .stamina-label-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }
        .stamina-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-family: var(--font-mono);
        }
        .stamina-value {
            font-size: 28px;
            font-weight: 800;
            font-family: var(--font-mono);
            letter-spacing: -0.5px;
            transition: color var(--transition-fast);
            line-height: 1;
        }
        .stamina-value.normal {
            color: #7ecb9a;
        }
        .stamina-value.critical {
            color: #f05a5f;
            animation: pulse-value 0.5s ease-out;
        }
        @keyframes pulse-value {
            0%,
            100% {
                transform: scale(1);
            }
            40% {
                transform: scale(1.12);
                color: #ff7075;
            }
        }

        .stamina-max {
            font-size: 14px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-weight: 400;
        }

        /* 体力条轨道 */
        .stamina-track {
            position: relative;
            height: 22px;
            background: #1c1f22;
            border-radius: 11px;
            overflow: visible;
            border: 1px solid var(--border);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
            cursor: default;
        }

        /* 红线区域标识（始终可见） */
        .redline-zone {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 20%;
            /* 0-20% */
            background: var(--red-zone);
            border-radius: 11px 0 0 11px;
            border-right: none;
            z-index: 0;
            box-shadow: inset 0 0 12px rgba(200, 60, 65, 0.25);
        }

        /* 红线标记竖线 */
        .redline-marker {
            position: absolute;
            left: 20%;
            top: -4px;
            bottom: -4px;
            width: 2px;
            background: var(--red-line);
            z-index: 3;
            border-radius: 1px;
            box-shadow: 0 0 8px var(--red-glow);
            pointer-events: none;
        }
        .redline-marker::after {
            content: '红线';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: #f05a5f;
            font-family: var(--font-mono);
            letter-spacing: 0.5px;
            white-space: nowrap;
            opacity: 0.85;
        }

        /* 体力填充条 */
        .stamina-fill {
            position: absolute;
            left: 0;
            top: 2px;
            bottom: 2px;
            border-radius: 9px;
            z-index: 1;
            transition: width var(--transition-smooth), background-color var(--transition-fast);
            pointer-events: none;
            min-width: 0;
        }
        .stamina-fill.safe {
            background: linear-gradient(180deg, #5cc48a 0%, #3d9e65 100%);
            box-shadow: 0 0 10px var(--green-glow), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }
        .stamina-fill.danger {
            background: linear-gradient(180deg, #f06268 0%, #c94045 100%);
            box-shadow: 0 0 14px var(--red-glow), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: danger-pulse-fill 0.45s ease-out;
        }
        @keyframes danger-pulse-fill {
            0% {
                box-shadow: 0 0 28px rgba(255, 60, 65, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            }
            100% {
                box-shadow: 0 0 14px var(--red-glow), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            }
        }

        /* 网格线覆盖 */
        .stamina-grid-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            border-radius: 11px;
            background: repeating-linear-gradient(90deg,
                    transparent,
                    transparent calc(10% - 1px),
                    rgba(255, 255, 255, 0.03) calc(10% - 1px),
                    rgba(255, 255, 255, 0.03) 10%);
        }

        /* 行动面板 */
        .action-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 52px;
            transition: min-height var(--transition-smooth);
        }

        .button-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        /* 按钮通用样式 */
        .btn {
            flex: 1;
            padding: 14px 16px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            font-family: var(--font-sans);
            letter-spacing: 0.3px;
            transition:
                background-color var(--transition-fast),
                border-color var(--transition-fast),
                box-shadow var(--transition-fast),
                opacity var(--transition-fast),
                transform var(--transition-fast);
            position: relative;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn:active {
            transform: scale(0.97);
        }

        /* 进攻按钮 */
        .btn-attack {
            background: #3d2a2c;
            border-color: #5c3a3d;
            color: #e8b4b6;
            box-shadow: 0 2px 0 #2a1819;
        }
        .btn-attack:hover {
            background: #4a3235;
            border-color: #6e4548;
            color: #f0c8ca;
            box-shadow: 0 2px 0 #2a1819, 0 0 16px rgba(200, 100, 105, 0.2);
        }
        .btn-attack:active {
            background: #352325;
            box-shadow: 0 1px 0 #1a1011;
            transform: scale(0.96);
        }
        .btn-attack .btn-icon {
            font-size: 18px;
            line-height: 1;
        }

        /* 休整按钮 */
        .btn-rest {
            background: #2a3036;
            border-color: #3d444b;
            color: #bcc7d0;
            box-shadow: 0 2px 0 #1c1f23;
        }
        .btn-rest:hover {
            background: #30373e;
            border-color: #4a525a;
            color: #d0d9e0;
            box-shadow: 0 2px 0 #1c1f23, 0 0 12px rgba(150, 160, 170, 0.15);
        }
        .btn-rest:active {
            background: #252a2f;
            box-shadow: 0 1px 0 #15171a;
            transform: scale(0.96);
        }
        .btn-rest .btn-icon {
            font-size: 18px;
            line-height: 1;
        }

        /* 按钮隐藏（完全消失，不是灰掉） */
        .btn-hidden {
            display: none !important;
        }

        /* 叙事文字 */
        .narrative-text {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 14px;
            background: #261c1d;
            border-left: 3px solid #c94045;
            border-radius: 6px;
            color: #d4a8aa;
            font-size: 14px;
            line-height: 1.55;
            letter-spacing: 0.2px;
            animation: narrative-in 0.35s ease-out;
            font-style: italic;
        }
        .narrative-text .narrative-icon {
            font-size: 16px;
            flex-shrink: 0;
            opacity: 0.8;
            margin-top: 1px;
        }
        @keyframes narrative-in {
            0% {
                opacity: 0;
                transform: translateY(-6px);
                border-left-color: transparent;
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                border-left-color: #c94045;
            }
        }

        /* 行动反馈提示 */
        .feedback-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2f34;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 12px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            letter-spacing: 0.4px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease-out, top 0.2s ease-out;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
        }
        .feedback-toast.show {
            opacity: 1;
            top: 28px;
        }
        .feedback-toast.critical-toast {
            border-color: #c94045;
            color: #e8b4b6;
            background: #261c1d;
            box-shadow: 0 4px 20px rgba(200, 60, 65, 0.3);
        }

        /* 响应式 */
        @media (max-width: 400px) {
            .command-panel {
                padding: 24px 16px 18px;
                border-radius: 10px;
            }
            .stamina-value {
                font-size: 24px;
            }
            .btn {
                padding: 12px 10px;
                font-size: 14px;
            }
            .unit-name {
                font-size: 15px;
            }
            .redline-marker::after {
                font-size: 8px;
                top: -16px;
            }
        }
    </style>
</head>
<body>

    <!-- 行动反馈浮层 -->
    <div class="feedback-toast" id="feedbackToast"></div>

    <!-- 主面板 -->
    <div class="command-panel">
        <!-- 头部：部队信息 -->
        <div class="panel-header">
            <div class="unit-insignia">Ⅲ</div>
            <div class="unit-info">
                <div class="unit-name">第三纵队</div>
                <div class="unit-subtitle">步兵纵队 · 一线梯队</div>
                <div class="badge-row">
                    <span class="badge">编制 2,400</span>
                    <span class="badge warning" id="statusBadge">可行动</span>
                </div>
            </div>
        </div>

        <!-- 体力条区域 -->
        <div class="stamina-section">
            <div class="stamina-label-row">
                <span class="stamina-label">部队体力</span>
                <span>
                    <span class="stamina-value normal" id="staminaValue">25</span>
                    <span class="stamina-max"> / 100</span>
                </span>
            </div>
            <div class="stamina-track" id="staminaTrack">
                <!-- 红线区域标识 -->
                <div class="redline-zone"></div>
                <!-- 红线标记 -->
                <div class="redline-marker"></div>
                <!-- 体力填充条 -->
                <div class="stamina-fill safe" id="staminaFill" style="width: 25%;"></div>
                <!-- 网格覆盖 -->
                <div class="stamina-grid-overlay"></div>
            </div>
        </div>

        <!-- 行动面板 -->
        <div class="action-panel" id="actionPanel">
            <!-- 按钮行：进攻 + 休整 -->
            <div class="button-row" id="buttonRow">
                <button class="btn btn-attack" id="btnAttack" onclick="forceBloc.attack()">
                    <span class="btn-icon">⚔️</span> 进攻
                </button>
                <button class="btn btn-rest" id="btnRest" onclick="forceBloc.rest()">
                    <span class="btn-icon">🛌</span> 休整
                </button>
            </div>
            <!-- 叙事文字（初始隐藏，体力>20时不显示） -->
            <div class="narrative-text" id="narrativeText" style="display: none;">
                <span class="narrative-icon">⚠</span>
                <span id="narrativeContent">第三纵队已无力前进。士兵们在掩体后沉默地蹲着。</span>
            </div>
        </div>
    </div>

    <script>
        /**
         * ForceBloc -- 部队体力状态管理
         *
         * 职责：
         *   - 管理体力值（stamina）
         *   - 执行进攻扣减 / 休整恢复
         *   - 检查红线阈值（≤20 触发红线）
         *   - 通过回调通知UI更新
         *
         * 核心规则：
         *   - 红线阈值：20
         *   - 体力 ≤ 20：禁止进攻，进攻按钮消失
         *   - 体力 > 20：进攻可用
         *   - 每次进攻消耗 3 点体力
         *   - 每次休整恢复 10 点体力（上限100）
         *   - 体力不会低于 0
         */
        class ForceBloc {
            constructor(initialStamina = 25, maxStamina = 100, redlineThreshold = 20) {
                this.maxStamina = maxStamina;
                this.redlineThreshold = redlineThreshold;
                this.stamina = Math.min(Math.max(initialStamina, 0), maxStamina);
                this.attackCost = 3;
                this.restRecovery = 10;

                // UI更新回调
                this.onStateChange = null;
                // 上一次是否处于红线状态（用于检测状态转换）
                this.wasInRedline = this.checkRedline();
            }

            /** 检查是否在红线以下 */
            checkRedline() {
                return this.stamina <= this.redlineThreshold;
            }

            /** 是否可以进攻 */
            canAttack() {
                return !this.checkRedline() && this.stamina > 0;
            }

            /** 进攻：消耗体力 */
            attack() {
                if (!this.canAttack()) {
                    // 不应到达这里（按钮应已消失），但保留安全检查
                    this._notify('attack_blocked', '部队已无力进攻');
                    return false;
                }

                const prevStamina = this.stamina;
                this.stamina = Math.max(this.stamina - this.attackCost, 0);
                const wasRedline = this.wasInRedline;
                const isRedline = this.checkRedline();
                this.wasInRedline = isRedline;

                // 判断是否刚跌破红线
                const justCrossedRedline = !wasRedline && isRedline;

                this._notify('attacked', {
                    prevStamina,
                    newStamina: this.stamina,
                    cost: this.attackCost,
                    justCrossedRedline,
                    isRedline,
                });

                return true;
            }

            /** 休整：恢复体力 */
            rest() {
                const prevStamina = this.stamina;
                this.stamina = Math.min(this.stamina + this.restRecovery, this.maxStamina);
                const wasRedline = this.wasInRedline;
                const isRedline = this.checkRedline();
                this.wasInRedline = isRedline;

                // 判断是否刚脱离红线
                const justLeftRedline = wasRedline && !isRedline;

                this._notify('rested', {
                    prevStamina,
                    newStamina: this.stamina,
                    recovered: this.stamina - prevStamina,
                    justLeftRedline,
                    isRedline,
                });

                return true;
            }

            /** 获取当前状态快照 */
            getState() {
                return {
                    stamina: this.stamina,
                    maxStamina: this.maxStamina,
                    redlineThreshold: this.redlineThreshold,
                    isInRedline: this.checkRedline(),
                    canAttack: this.canAttack(),
                    staminaPercent: (this.stamina / this.maxStamina) * 100,
                };
            }

            /** 内部通知 */
            _notify(actionType, data) {
                if (typeof this.onStateChange === 'function') {
                    this.onStateChange(actionType, data, this.getState());
                }
            }
        }

        // ============ 初始化 ForceBloc ============
        const forceBloc = new ForceBloc(25, 100, 20);

        // ============ DOM 引用 ============
        const staminaValueEl = document.getElementById('staminaValue');
        const staminaFillEl = document.getElementById('staminaFill');
        const btnAttackEl = document.getElementById('btnAttack');
        const btnRestEl = document.getElementById('btnRest');
        const buttonRowEl = document.getElementById('buttonRow');
        const narrativeTextEl = document.getElementById('narrativeText');
        const narrativeContentEl = document.getElementById('narrativeContent');
        const feedbackToastEl = document.getElementById('feedbackToast');
        const statusBadgeEl = document.getElementById('statusBadge');
        const actionPanelEl = document.getElementById('actionPanel');

        let feedbackTimer = null;

        /** 显示短暂反馈提示 */
        function showFeedback(message, isCritical = false) {
            if (feedbackTimer) clearTimeout(feedbackTimer);
            feedbackToastEl.textContent = message;
            feedbackToastEl.className = 'feedback-toast show' + (isCritical ? ' critical-toast' : '');
            feedbackTimer = setTimeout(() => {
                feedbackToastEl.className = 'feedback-toast';
                feedbackTimer = null;
            }, 1800);
        }

        /** 更新UI -- 由ForceBloc状态驱动 */
        function updateUI(actionType, data, state) {
            const {
                stamina,
                maxStamina,
                isInRedline,
                canAttack,
                staminaPercent
            } = state;

            // 1. 更新体力数字
            staminaValueEl.textContent = stamina;
            // 移除并重新触发动画类
            staminaValueEl.classList.remove('normal', 'critical');
            if (isInRedline) {
                staminaValueEl.classList.add('critical');
                // 强制重启动画
                void staminaValueEl.offsetWidth;
                staminaValueEl.classList.remove('critical');
                void staminaValueEl.offsetWidth;
                staminaValueEl.classList.add('critical');
            } else {
                staminaValueEl.classList.add('normal');
            }

            // 2. 更新体力填充条
            staminaFillEl.style.width = Math.max(staminaPercent, 0.5) + '%'; // 最小值保证可见
            staminaFillEl.classList.remove('safe', 'danger');
            if (isInRedline) {
                staminaFillEl.classList.add('danger');
                // 强制重启动画
                void staminaFillEl.offsetWidth;
                staminaFillEl.classList.remove('danger');
                void staminaFillEl.offsetWidth;
                staminaFillEl.classList.add('danger');
            } else {
                staminaFillEl.classList.add('safe');
            }

            // 3. 进攻按钮可见性 -- 核心验证点：消失而非变灰
            if (canAttack) {
                // 显示进攻按钮
                btnAttackEl.classList.remove('btn-hidden');
            } else {
                // 进攻按钮直接消失
                btnAttackEl.classList.add('btn-hidden');
            }

            // 4. 叙事文字显示/隐藏
            if (isInRedline) {
                narrativeTextEl.style.display = 'flex';
                // 如果是刚跌破红线，触发动画重播
                if (actionType === 'attacked' && data.justCrossedRedline) {
                    narrativeTextEl.style.animation = 'none';
                    void narrativeTextEl.offsetWidth;
                    narrativeTextEl.style.animation = 'narrative-in 0.35s ease-out';
                }
                narrativeContentEl.textContent =
                    '第三纵队已无力前进。士兵们在掩体后沉默地蹲着。';
            } else {
                narrativeTextEl.style.display = 'none';
            }

            // 5. 状态徽章
            if (isInRedline) {
                statusBadgeEl.textContent = '红线触发';
                statusBadgeEl.classList.add('warning');
            } else {
                statusBadgeEl.textContent = '可行动';
                statusBadgeEl.classList.remove('warning');
            }

            // 6. 休整按钮在体力满时视觉提示（但保持可用）
            if (stamina >= maxStamina) {
                btnRestEl.style.opacity = '0.5';
                btnRestEl.style.cursor = 'not-allowed';
            } else {
                btnRestEl.style.opacity = '1';
                btnRestEl.style.cursor = 'pointer';
            }

            // 7. 行动反馈提示
            if (actionType === 'attacked' && data.justCrossedRedline) {
                showFeedback('⚠ 体力跌破红线！进攻按钮已移除', true);
                // 控制台日志（便于验证）
                console.log(
                    `[ForceBloc] 红线触发！体力 ${data.prevStamina} → ${data.newStamina}（阈值 ${forceBloc.redlineThreshold}），进攻按钮已消失`
                );
            } else if (actionType === 'attacked') {
                showFeedback(`⚔️ 进攻消耗 ${data.cost} 点体力 · 剩余 ${data.newStamina}`);
                console.log(
                    `[ForceBloc] 进攻：体力 ${data.prevStamina} → ${data.newStamina}，红线状态：${data.isRedline}`
                );
            } else if (actionType === 'rested' && data.justLeftRedline) {
                showFeedback('🛌 部队恢复体力，脱离红线 · 进攻按钮已恢复', false);
                console.log(
                    `[ForceBloc] 脱离红线！体力 ${data.prevStamina} → ${data.newStamina}，进攻按钮已重新出现`
                );
            } else if (actionType === 'rested') {
                const recMsg = data.recovered > 0 ?
                    `🛌 休整恢复 ${data.recovered} 点体力 · 当前 ${data.newStamina}` :
                    '体力已满，无需休整';
                showFeedback(recMsg);
                console.log(
                    `[ForceBloc] 休整：体力 ${data.prevStamina} → ${data.newStamina}，红线状态：${data.isRedline}`
                );
            } else if (actionType === 'attack_blocked') {
                showFeedback('⛔ 部队已无力进攻', true);
            }
        }

        // 注册回调
        forceBloc.onStateChange = updateUI;

        // ============ 初始渲染 ============
        const initState = forceBloc.getState();
        updateUI('init', {
            prevStamina: initState.stamina,
            newStamina: initState.stamina,
            cost: 0,
            recovered: 0,
            justCrossedRedline: false,
            justLeftRedline: false,
            isRedline: initState.isInRedline,
        }, initState);

        // ============ 键盘快捷键（方便测试） ============
        document.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'A') {
                // A键 = 进攻
                e.preventDefault();
                if (forceBloc.canAttack()) {
                    forceBloc.attack();
                } else {
                    showFeedback('⛔ 进攻不可用 -- 体力在红线以下', true);
                }
            } else if (e.key === 'r' || e.key === 'R') {
                // R键 = 休整
                e.preventDefault();
                if (forceBloc.getState().stamina < forceBloc.maxStamina) {
                    forceBloc.rest();
                } else {
                    showFeedback('体力已满，无需休整');
                }
            }
        });

        // ============ 控制台输出初始状态 ============
        console.log('═══════════════════════════════════');
        console.log('  C02 · ForceBloc 红线验证原型');
        console.log('  部队：第三纵队');
        console.log(`  初始体力：${initState.stamina}/${initState.maxStamina}`);
        console.log(`  红线阈值：${initState.redlineThreshold}`);
        console.log(`  进攻消耗：${forceBloc.attackCost} 点/次`);
        console.log(`  休整恢复：${forceBloc.restRecovery} 点/次`);
        console.log('  快捷键：A=进攻 R=休整');
        console.log('  验收要点：');
        console.log('    ✓ 体力≤20时进攻按钮直接消失（非灰掉）');
        console.log('    ✓ 按钮消失同时出现叙事文字');
        console.log('    ✓ 休整后体力>20时按钮重新出现');
        console.log('    ✓ 所有状态变化实时响应');
        console.log('═══════════════════════════════════');
        console.log('');
        console.log('💡 快速验证流程：');
        console.log('  1. 当前体力25，点击[进攻] → 体力22（仍可进攻）');
        console.log('  2. 再次点击[进攻] → 体力19（跌破红线）');
        console.log('  3. 观察：进攻按钮消失，叙事文字出现');
        console.log('  4. 点击[休整] → 体力29（脱离红线）');
        console.log('  5. 观察：进攻按钮重新出现，叙事文字消失');
        console.log('');
    </script>
</body>
