<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, viewport-fit=cover">
  <title>指挥官决策系统 · 意图引擎</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #080c12;
      font-family: 'Courier New', 'Source Code Pro', 'Menlo', 'Consolas', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      color: #b0c7d9;
    }

    .command-shell {
      width: 100%;
      max-width: 720px;
      background: #0b121b;
      border: 1px solid #263545;
      border-radius: 18px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(60,130,210,0.2) inset;
      padding: 24px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
    }

    /* 扫描线 */
    .command-shell::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,200,40,0.02) 0px, rgba(0,0,0,0.02) 2px, transparent 3px);
      pointer-events: none;
      border-radius: 18px;
    }

    /* 顶部状态栏 */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1f303f;
      padding-bottom: 12px;
      position: relative;
      z-index: 1;
    }
    .header-icon { font-size: 1.8rem; }
    .header h1 {
      font-size: 1.3rem;
      letter-spacing: 2px;
      color: #cedfef;
      text-transform: uppercase;
      text-shadow: 0 0 8px #386ea0;
    }
    .stat-tags {
      margin-left: auto;
      display: flex;
      gap: 16px;
      font-size: 0.75rem;
    }
    .stat-tag {
      background: #0d1822;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #2a4057;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 意图指示器 */
    .intent-badge {
      background: #112233;
      border: 1px solid #2b527a;
      border-radius: 24px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
      color: #8db8e0;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 0.9rem;
      width: fit-content;
    }
    .intent-badge.active {
      border-color: #eaac30;
      color: #f5c358;
      box-shadow: 0 0 16px rgba(234,172,48,0.3);
    }
    .intent-badge.locked {
      opacity: 0.8;
    }

    /* 情境面板 */
    .narrative-panel {
      background: #0f1923;
      border: 1px solid #1a2b3c;
      border-radius: 14px;
      padding: 16px 16px 12px;
      position: relative;
      z-index: 1;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    .narrative-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #537394;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .narrative-text {
      font-size: 1rem;
      line-height: 1.7;
      color: #c2d4e9;
      text-shadow: 0 0 3px #103450;
      white-space: pre-wrap;
    }

    /* 意图选择面板 */
    .intent-panel {
      background: #0e1722;
      border: 1px dashed #2b4460;
      border-radius: 12px;
      padding: 14px;
      position: relative;
      z-index: 1;
    }
    .intent-panel p {
      font-size: 0.8rem;
      color: #718aa5;
      margin-bottom: 10px;
    }
    .intent-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .intent-btn {
      background: #0f1a26;
      border: 1px solid #2d4662;
      border-left: 4px solid #2d5275;
      border-radius: 10px;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 0.9rem;
      color: #c7daf0;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 110px;
    }
    .intent-btn:hover {
      background: #14283a;
      border-color: #5887b9;
      border-left-color: #eaac30;
      box-shadow: 0 0 14px rgba(234,172,48,0.25);
      color: #fff;
    }
    .intent-btn.selected {
      border-color: #eaac30;
      border-left-color: #eaac30;
      background: #1a2738;
      box-shadow: 0 0 20px rgba(234,172,48,0.3);
    }

    /* 行动选项面板 */
    .actions-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    .action-btn {
      background: #0d1722;
      border: 1px solid #23374d;
      border-left: 4px solid #3c5f82;
      border-radius: 10px;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 0.95rem;
      color: #d3e2f5;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .action-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .action-btn:hover:not(:disabled) {
      background: #122536;
      border-color: #456f9e;
      border-left-color: #d48c2c;
      box-shadow: 0 0 16px rgba(200,140,40,0.25);
    }
    .action-icon { font-size: 1.3rem; min-width: 28px; }

    /* 后果反馈 */
    .consequence-block {
      background: #0f1a23;
      border-left: 4px solid #c9a03a;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 10px;
      color: #e4c27e;
      font-style: italic;
      animation: fadeIn 0.4s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* 指挥官日志 */
    .log-panel {
      background: #0a1018;
      border: 1px solid #1c2c3d;
      border-radius: 12px;
      padding: 12px;
      position: relative;
      z-index: 1;
    }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #6080a0;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .log-entries {
      max-height: 160px;
      overflow-y: auto;
      font-size: 0.8rem;
      color: #96b2cf;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .log-entry { display: flex; gap: 8px; border-bottom: 1px dashed #1a2c3e; padding-bottom: 4px; }
    .log-time { color: #3d6185; white-space: nowrap; font-size: 0.7rem; }
    .reset-btn {
      background: transparent;
      border: 1px solid #2e4a64;
      color: #7896b5;
      padding: 4px 14px;
      border-radius: 16px;
      font-family: inherit;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .reset-btn:hover { border-color: #5b83ab; color: #d0e2f8; background: #162435; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="command-shell">
    <div class="header">
      <span class="header-icon">⚔️</span>
      <h1>指挥官决策系统</h1>
      <div class="stat-tags">
        <span class="stat-tag">❤️ 士气 <span id="moraleValue">65</span></span>
        <span class="stat-tag">🕒 <span id="timeValue">09:15</span></span>
      </div>
    </div>

    <!-- 当前意图指示器 -->
    <div id="intentBadge" class="intent-badge">
      <span>🎯 意图：</span><span id="intentLabel">待确定</span>
    </div>

    <!-- 叙事面板 -->
    <div class="narrative-panel">
      <div class="narrative-label">📡 情报简报</div>
      <div class="narrative-text" id="narrativeText"></div>
      <div id="consequenceContainer"></div>
    </div>

    <!-- 意图选择面板（动态显示） -->
    <div id="intentPanel" class="intent-panel"></div>

    <!-- 行动选项面板 -->
    <div id="actionsPanel" class="actions-panel"></div>

    <!-- 指挥官日志 -->
    <div class="log-panel">
      <div class="log-header">
        <span>📋 指挥官日志</span>
        <button id="resetButton" class="reset-btn">⟳ 重置任务</button>
      </div>
      <div class="log-entries" id="logEntries"></div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- 游戏状态 ----------
      const state = {
        morale: 65,
        time: "09:15",
        currentNodeId: 'sector_conflict',
        // 当前意图 (null表示未选择)
        currentIntent: null,
        // 历史记录 (flags)
        flags: [],
        // 日志
        log: [{ time: "09:10", text: "指挥系统上线" }]
      };

      // ---------- 故事节点定义 ----------
      const storyNodes = {
        sector_conflict: {
          id: 'sector_conflict',
          narrative: `侦察报告：布雷克星区边缘发现未知舰队踪迹，三艘中型护卫舰正在接近我方前哨站。对方尚未开启火控雷达，但已进入警戒区。  \n前哨站内有平民工程师团队正在进行重要设备维护。`,
          // 本节点可用的意图选项
          intents: [
            { id: 'protect_civilians', label: '🛡️ 保护平民', desc: '优先保障非战斗人员安全' },
            { id: 'aggressive_defense', label: '⚡ 积极防御', desc: '展示武力，遏制敌方前进' },
            { id: 'gather_intel', label: '🕵️ 收集情报', desc: '延后冲突，获取更多敌方信息' }
          ],
          // 行动选项（每个行动与某个意图匹配会产生加成）
          options: [
            {
              id: 'evacuate',
              text: '🚁 立即疏散前哨平民',
              icon: '🚁',
              matchesIntent: 'protect_civilians',
              baseConsequences: { morale: 5, flag: 'evacuated_civilians' },
              narrative: '你下令优先撤离所有非战斗人员。运输机正在前往途中。',
              intentBonus: { morale: 10, narrative_extra: ' 平民安全得到了最大保障，部队士气高涨。' },
              intentPenalty: { morale: -3, narrative_extra: ' 但疏散行动分散了防御力量，部分士兵感到不安。' }
            },
            {
              id: 'warning_shot',
              text: '💥 发射警告射击，迫其转向',
              icon: '💥',
              matchesIntent: 'aggressive_defense',
              baseConsequences: { morale: -2, flag: 'fired_warning' },
              narrative: '主炮对敌方前方区域实施警告射击。',
              intentBonus: { morale: 8, narrative_extra: ' 强硬的姿态让敌人减速，指挥室爆发出赞赏的低语。' },
              intentPenalty: { morale: -8, narrative_extra: ' 但平民仍在危险区域，此举被批评为鲁莽。' }
            },
            {
              id: 'stealth_scan',
              text: '🛰️ 启动被动扫描，延迟回应',
              icon: '📡',
              matchesIntent: 'gather_intel',
              baseConsequences: { morale: 0, flag: 'scanned_enemy' },
              narrative: '电子战小组悄无声息地开始分析敌方信号特征。',
              intentBonus: { morale: 5, narrative_extra: ' 获得了宝贵的敌舰弱点数据，情报部门极为满意。' },
              intentPenalty: { morale: -5, narrative_extra: ' 但犹豫不决让前线部队感到焦虑。' }
            }
          ],
          nextNode: 'sector_aftermath'
        },
        sector_aftermath: {
          id: 'sector_aftermath',
          narrative: `局势发生转变。敌方舰队在收到我方回应后，暂时停留在警戒区边缘，似乎在进行内部通讯。平民状况与战术态势因你刚才的行动而变化。`,
          intents: [
            { id: 'secure_position', label: '🔒 稳固防线', desc: '建立防御优势' },
            { id: 'rescue_operation', label: '🏥 人道救援', desc: '全力救治与保护' },
            { id: 'diplomatic_bluff', label: '📜 外交讹诈', desc: '利用信息差压迫对方' }
          ],
          options: [
            {
              id: 'fortify',
              text: '🏰 部署自动炮台并加固护盾',
              icon: '🏰',
              matchesIntent: 'secure_position',
              baseConsequences: { morale: 3, flag: 'fortified' },
              narrative: '工程队开始紧急构筑防线。',
              intentBonus: { morale: 7, narrative_extra: ' 坚固的工事让每个人都感到安心。' },
              intentPenalty: { morale: -2, narrative_extra: ' 资源被用于防御，救援行动略有延迟。' }
            },
            {
              id: 'medical_teams',
              text: '🏥 派遣医疗队至前哨',
              icon: '🩺',
              matchesIntent: 'rescue_operation',
              baseConsequences: { morale: 8, flag: 'medical_deployed' },
              narrative: '红十字运输船已出发，优先处理伤员。',
              intentBonus: { morale: 5, narrative_extra: ' 人道主义举动赢得尊重。' },
              intentPenalty: { morale: -4, narrative_extra: ' 防线因此出现短暂空缺，令人担忧。' }
            },
            {
              id: 'bluff',
              text: '🎭 发送虚假增援信号',
              icon: '🎭',
              matchesIntent: 'diplomatic_bluff',
              baseConsequences: { morale: -2, flag: 'bluffed' },
              narrative: '通讯官伪造了大量舰队正在跃迁的信号。',
              intentBonus: { morale: 6, narrative_extra: ' 敌方开始动摇，我方获得谈判优势。' },
              intentPenalty: { morale: -6, narrative_extra: ' 若被识破将陷入绝境，军官们忧心忡忡。' }
            }
          ],
          nextNode: null // 结局
        }
      };

      // ---------- DOM元素 ----------
      const narrativeText = document.getElementById('narrativeText');
      const intentBadge = document.getElementById('intentBadge');
      const intentLabel = document.getElementById('intentLabel');
      const intentPanel = document.getElementById('intentPanel');
      const actionsPanel = document.getElementById('actionsPanel');
      const consequenceContainer = document.getElementById('consequenceContainer');
      const moraleValue = document.getElementById('moraleValue');
      const timeValue = document.getElementById('timeValue');
      const logEntries = document.getElementById('logEntries');
      const resetButton = document.getElementById('resetButton');

      // ---------- 辅助函数 ----------
      function updateUI() {
        moraleValue.textContent = state.morale;
        timeValue.textContent = state.time;
      }

      function addLog(text) {
        const now = new Date();
        const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        state.log.push({ time, text });
        renderLog();
      }

      function renderLog() {
        logEntries.innerHTML = state.log.map(e => 
          `<div class="log-entry"><span class="log-time">${e.time}</span><span>${e.text}</span></div>`
        ).join('');
        logEntries.scrollTop = logEntries.scrollHeight;
      }

      function advanceTime(minutes) {
        let [h, m] = state.time.split(':').map(Number);
        m += minutes;
        if (m >= 60) { h += Math.floor(m / 60); m %= 60; }
        state.time = `${String(h % 24).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        updateUI();
      }

      // 清除后果文本
      function clearConsequence() {
        consequenceContainer.innerHTML = '';
      }

      // ---------- 核心：渲染节点 ----------
      function renderNode(nodeId) {
        const node = storyNodes[nodeId];
        if (!node) {
          narrativeText.innerHTML = '<em>任务结束。指挥链已断开。</em>';
          intentPanel.innerHTML = '';
          actionsPanel.innerHTML = '';
          intentBadge.classList.remove('active');
          intentLabel.textContent = '无';
          return;
        }

        // 显示情境
        narrativeText.innerHTML = node.narrative.replace(/\n/g, '<br>');
        clearConsequence();

        // 重置当前意图
        state.currentIntent = null;
        updateIntentBadge();

        // 渲染意图选择面板
        if (node.intents && node.intents.length > 0) {
          intentPanel.innerHTML = `
            <p>🔷 确定本次行动的 <strong>指挥意图</strong> （选择后将影响行动效果）</p>
            <div class="intent-options">
              ${node.intents.map(intent => 
                `<button class="intent-btn" data-intent="${intent.id}">
                  <span>${intent.label}</span>
                  <small style="color:#8899aa; font-size:0.7rem;">${intent.desc}</small>
                </button>`
              ).join('')}
            </div>
          `;
          // 绑定意图按钮事件
          intentPanel.querySelectorAll('.intent-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              const intentId = btn.dataset.intent;
              selectIntent(node, intentId);
            });
          });
        } else {
          intentPanel.innerHTML = '';
        }

        // 先隐藏行动面板，等意图选择后再显示
        actionsPanel.innerHTML = '';
        actionsPanel.classList.add('hidden');
      }

      // 更新意图指示器外观
      function updateIntentBadge() {
        if (state.currentIntent) {
          const node = storyNodes[state.currentNodeId];
          const intentObj = node?.intents?.find(i => i.id === state.currentIntent);
          intentLabel.textContent = intentObj ? intentObj.label : state.currentIntent;
          intentBadge.classList.add('active');
          intentBadge.classList.add('locked');
        } else {
          intentLabel.textContent = '待确定';
          intentBadge.classList.remove('active');
          intentBadge.classList.remove('locked');
        }
      }

      // 选择意图
      function selectIntent(node, intentId) {
        state.currentIntent = intentId;
        updateIntentBadge();
        addLog(`意图锁定：${node.intents.find(i => i.id === intentId)?.label || intentId}`);

        // 意图面板中的按钮变为选中状态
        intentPanel.querySelectorAll('.intent-btn').forEach(btn => {
          if (btn.dataset.intent === intentId) {
            btn.classList.add('selected');
          } else {
            btn.classList.remove('selected');
          }
        });

        // 显示行动选项
        renderActions(node);
      }

      // 渲染行动选项
      function renderActions(node) {
        if (!node.options) return;
        actionsPanel.classList.remove('hidden');
        actionsPanel.innerHTML = '';
        node.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'action-btn';
          btn.innerHTML = `<span class="action-icon">${opt.icon || '🔘'}</span>${opt.text}`;
          btn.addEventListener('click', () => handleAction(node, opt));
          actionsPanel.appendChild(btn);
        });
      }

      // 处理行动选择，结合意图计算后果
      function handleAction(node, option) {
        // 禁用所有按钮
        actionsPanel.querySelectorAll('.action-btn').forEach(b => b.disabled = true);
        intentPanel.querySelectorAll('.intent-btn').forEach(b => b.disabled = true);

        const intentId = state.currentIntent;
        const isMatch = intentId && option.matchesIntent === intentId;

        // 基础后果
        let moraleChange = option.baseConsequences.morale || 0;
        let narrativeExtra = '';

        // 意图加成或惩罚
        if (isMatch && option.intentBonus) {
          moraleChange += option.intentBonus.morale || 0;
          narrativeExtra = option.intentBonus.narrative_extra || '';
        } else if (!isMatch && option.intentPenalty) {
          moraleChange += option.intentPenalty.morale || 0;
          narrativeExtra = option.intentPenalty.narrative_extra || '';
        }

        // 应用士气变化
        state.morale = Math.min(100, Math.max(0, state.morale + moraleChange));
        if (option.baseConsequences.flag) {
          state.flags.push(option.baseConsequences.flag);
        }

        // 显示叙事反馈
        const fullNarrative = option.narrative + (narrativeExtra ? ' ' + narrativeExtra : '');
        consequenceContainer.innerHTML = `<div class="consequence-block">📝 ${fullNarrative}</div>`;

        // 日志
        addLog(`行动：${option.text} ${isMatch ? '(意图匹配 ✓)' : '(意图偏离)'}`);
        if (option.baseConsequences.flag) addLog(`标记：${option.baseConsequences.flag}`);

        updateUI();
        advanceTime(8);

        // 延迟进入下一节点或结束
        setTimeout(() => {
          if (node.nextNode) {
            state.currentNodeId = node.nextNode;
            addLog('--- 新阶段 ---');
            renderNode(node.nextNode);
          } else {
            narrativeText.innerHTML = '<em>报告：事件已暂时平息。你的决策将被记录。</em>';
            intentPanel.innerHTML = '';
            actionsPanel.innerHTML = '';
            state.currentIntent = null;
            updateIntentBadge();
            addLog('任务结束。');
          }
        }, 2200);
      }

      // 重置
      function resetGame() {
        state.morale = 65;
        state.time = "09:15";
        state.currentNodeId = 'sector_conflict';
        state.currentIntent = null;
        state.flags = [];
        state.log = [{ time: "09:10", text: "指挥系统上线" }];
        updateUI();
        renderLog();
        renderNode('sector_conflict');
        addLog('任务重置 · 等待新指令');
      }

      resetButton.addEventListener('click', resetGame);

      // 启动
      updateUI();
      renderLog();
      renderNode('sector_conflict');
    })();
  </script>
</body>
</html>
